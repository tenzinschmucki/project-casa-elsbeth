services:
  - type: web
    name: casa-elsbeth-api
    runtime: python
    rootDir: deployment_candidate_v1/external_backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    plan: starter
    envVars:
      - key: APP_ENV
        value: prod
      - key: DATA_DIR
        value: /var/data/project-casa-elsbeth
      - key: CORS_ALLOW_ORIGINS
        sync: false
    disk:
      name: casa-elsbeth-data
      mountPath: /var/data/project-casa-elsbeth
      sizeGB: 1
